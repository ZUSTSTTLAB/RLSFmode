name: rlsfmode
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.7
  - cudatoolkit=11.3
  - cudnn=8.2
  - numpy=1.19
  - scipy=1.7.3
  - pandas=1.3.5
  - scikit-learn=1.0.2
  - rdkit=2023.03.2
  - h5py=3.7.0
  - protobuf=3.20
  - pillow
  - pip
  - pip:
      # ---- 深度学习 ----
      - tensorflow-gpu==1.15.5
      - tensorflow-estimator==1.15.1
      - tensorboard==1.15.0

      # ---- PyTorch（需 CUDA 匹配）----
      - torch==1.13.1+cu113
      - torchvision==0.14.1+cu113
      - --extra-index-url https://download.pytorch.org/whl/cu113

      # ---- 分子建模 / 对接 ----
      - biopython==1.81
      - biopandas==0.5.1
      - open3d==0.17.0
      - pybel==0.15.5

      # ---- 必需通用依赖 ----
      - pydantic==1.10.21
      - tqdm==4.65.0
      - joblib==1.2.0
      - requests==2.31.0

      # ---- 实用工具 ----
      - einops==0.6.1
      - pyquaternion==0.9.9
      - matplotlib==3.5.3
